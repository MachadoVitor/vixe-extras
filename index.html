<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fafcff">
  <meta name="description" content="Vixe Extras — controle de pagamentos de extras e fixos">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/logo-vixe.png">
  <link rel="apple-touch-icon" href="icons/logo-vixe.png">
  <link rel="stylesheet" href="styles.css">
  <title>Vixe Extras</title>
</head>
<body>
  <header class="app-header">
    <img src="icons/logo-vixe.png" alt="Vixe" class="logo">
    <h1 class="app-title">Vixe Extras</h1>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="insert">Inserir</button>
    <button class="tab" data-view="discount">Descontos</button>
    <button class="tab" data-view="register">Cadastros</button>
    <button class="tab" data-view="history">Histórico</button>
  </nav>

  <main id="app"></main>

  <footer class="app-footer">
    <p>Versão 1.0.0 — Criado por Vitor Machado&trade;</p>
    <p>&copy; 2026 — Todos os direitos reservados</p>
  </footer>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
